<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saga Studio - Ink & Imagination</title>
  
  <!-- Tailwind CSS with Typography Plugin for elegant Markdown rendering -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  
  <!-- Babel Standalone for live client-side JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map to resolve bare specifiers like 'react' and 'react-dom/client' in browser native ESM -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>

  <style>
    /* Custom Scrollbars and Smooth Focus Transitions */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #09090b;
    }
    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }
    
    /* Smooth transition for distraction-free mode toggle */
    .workspace-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <!-- React Mount Root -->
  <div id="root"></div>

  <!-- Browser Script containing React logic & Firebase services -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import ReactDOM from 'react-dom/client';
    
    // Firebase Imports via Official CDN
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { 
      getAuth, 
      signInWithCustomToken, 
      signInAnonymously, 
      onAuthStateChanged 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, 
      doc, 
      setDoc, 
      collection, 
      query, 
      onSnapshot, 
      addDoc, 
      updateDoc, 
      deleteDoc 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // Lucide Icons Import mapped cleanly from CDN
    import { 
      Book, 
      BookOpen, 
      Edit3, 
      Plus, 
      Trash2, 
      Eye, 
      Save, 
      Send, 
      ArrowLeft, 
      User, 
      Sparkles, 
      ChevronRight, 
      Settings, 
      Moon, 
      Sun, 
      Check, 
      Image as ImageIcon, 
      Loader2, 
      Heart, 
      Search, 
      BookOpenText, 
      AlignLeft, 
      CheckCircle,
      Clock,
      Bold,
      Italic,
      Heading1,
      Heading2,
      Quote,
      List,
      Code,
      Sparkle,
      AlertCircle
    } from 'https://esm.sh/lucide-react@0.344.0?external=react';

    // --- FIREBASE CONFIG & INITIALIZATION ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : {
          apiKey: "mock-api-key",
          authDomain: "mock-auth-domain",
          projectId: "mock-project-id",
          storageBucket: "mock-storage-bucket",
          messagingSenderId: "mock-sender-id",
          appId: "mock-app-id"
        };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'saga-studio';
    const apiKey = ""; // Set dynamically by environment at runtime

    // Preset Cover Gradients (for fallback/instant cover creation)
    const COVER_PRESETS = [
      { name: 'Midnight Aurora', class: 'bg-gradient-to-br from-slate-900 via-purple-900 to-indigo-900 text-purple-200' },
      { name: 'Sunset Quill', class: 'bg-gradient-to-br from-amber-900 via-red-900 to-amber-950 text-amber-100' },
      { name: 'Emerald Spell', class: 'bg-gradient-to-br from-emerald-950 via-teal-900 to-slate-900 text-teal-200' },
      { name: 'Crimson Archive', class: 'bg-gradient-to-br from-rose-950 via-neutral-900 to-zinc-950 text-rose-100' },
      { name: 'Oceanic Myth', class: 'bg-gradient-to-br from-cyan-950 via-blue-900 to-slate-900 text-cyan-200' },
    ];

    function App() {
      // --- STATE ---
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState({ penName: 'Anonymous Author', bio: 'Storyteller in the making.', avatarColor: 'indigo' });
      const [usersList, setUsersList] = useState({}); // Resolves Author IDs to names
      const [projects, setProjects] = useState([]);
      const [chapters, setChapters] = useState([]);
      
      // Navigation & UI States
      const [currentView, setCurrentView] = useState('library'); // 'library' | 'reader' | 'studio' | 'workspace'
      const [selectedProjectId, setSelectedProjectId] = useState(null);
      const [selectedChapterId, setSelectedChapterId] = useState(null);
      
      // Custom Profile Editor Modal
      const [showProfileModal, setShowProfileModal] = useState(false);
      const [tempPenName, setTempPenName] = useState('');
      const [tempBio, setTempBio] = useState('');
      
      // Project Creator Modal
      const [showProjectModal, setShowProjectModal] = useState(false);
      const [newProjTitle, setNewProjTitle] = useState('');
      const [newProjDesc, setNewProjDesc] = useState('');
      const [newProjGenre, setNewProjGenre] = useState('');
      const [newProjCoverType, setNewProjCoverType] = useState('preset'); // 'preset' | 'upload' | 'ai'
      const [newProjPresetIndex, setNewProjPresetIndex] = useState(0);
      const [newProjCoverPrompt, setNewProjCoverPrompt] = useState('');
      const [newProjCoverBase64, setNewProjCoverBase64] = useState('');
      const [generatingCover, setGeneratingCover] = useState(false);

      // Markdown Editor / Note State (for Studio Workspace)
      const [activeChapter, setActiveChapter] = useState(null);
      const [editorTitle, setEditorTitle] = useState('');
      const [editorContent, setEditorContent] = useState('');
      const [editorTab, setEditorTab] = useState('edit'); // 'edit' | 'preview' | 'split'
      const [distractionFree, setDistractionFree] = useState(false);
      
      // Reading Mode Customization
      const [readingTheme, setReadingTheme] = useState('cream'); // 'cream' | 'dark' | 'paper'
      const [readingFontSize, setReadingFontSize] = useState('lg'); // 'md' | 'lg' | 'xl'
      
      // Notification system
      const [notification, setNotification] = useState(null);
      
      // Search & Filter (Library)
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedGenre, setSelectedGenre] = useState('All');

      // Load external Markdown library (marked.js) dynamically
      const [markedLoaded, setMarkedLoaded] = useState(false);

      useEffect(() => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
        script.async = true;
        script.onload = () => setMarkedLoaded(true);
        document.head.appendChild(script);
        return () => {
          try {
            document.head.removeChild(script);
          } catch (e) {}
        };
      }, []);

      // --- STEP 1: AUTHENTICATION ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth error:", err);
            showToast("Authentication failed. Please reload the page.", "error");
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, (authUser) => {
          setUser(authUser);
        });
        return () => unsubscribe();
      }, []);

      // --- STEP 2: PROFILE SYNC ---
      useEffect(() => {
        if (!user) return;
        
        // Listen to current user's profile
        const userProfileRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
        const unsubscribeProfile = onSnapshot(userProfileRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            setProfile(data);
            setTempPenName(data.penName || 'Anonymous Author');
            setTempBio(data.bio || '');
          } else {
            // Init default profile
            setDoc(userProfileRef, {
              uid: user.uid,
              penName: 'Wandering Quill',
              bio: 'Crafting stories chapter by chapter.',
              avatarColor: 'indigo',
              createdAt: Date.now()
            });
          }
        });

        // Listen to all users' profiles to display authors' pen names
        const qUsers = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
        const unsubscribeAllUsers = onSnapshot(qUsers, (snap) => {
          const usersMap = {};
          snap.forEach((doc) => {
            usersMap[doc.id] = doc.data();
          });
          setUsersList(usersMap);
        }, (err) => console.error("Users sync error:", err));

        return () => {
          unsubscribeProfile();
          unsubscribeAllUsers();
        };
      }, [user]);

      // --- STEP 3: FIRESTORE DATA STREAMING ---
      useEffect(() => {
        if (!user) return;

        // Stream public projects
        const qProjects = query(collection(db, 'artifacts', appId, 'public', 'data', 'projects'));
        const unsubscribeProjects = onSnapshot(qProjects, (snap) => {
          const projs = [];
          snap.forEach((doc) => {
            projs.push({ id: doc.id, ...doc.data() });
          });
          setProjects(projs);
        }, (err) => {
          console.error("Projects sync error:", err);
          showToast("Failed to fetch projects.", "error");
        });

        // Stream public chapters
        const qChapters = query(collection(db, 'artifacts', appId, 'public', 'data', 'chapters'));
        const unsubscribeChapters = onSnapshot(qChapters, (snap) => {
          const chaps = [];
          snap.forEach((doc) => {
            chaps.push({ id: doc.id, ...doc.data() });
          });
          setChapters(chaps);
        }, (err) => {
          console.error("Chapters sync error:", err);
          showToast("Failed to fetch chapters.", "error");
        });

        return () => {
          unsubscribeProjects();
          unsubscribeChapters();
        };
      }, [user]);

      // Toast Helper
      const showToast = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => {
          setNotification(null);
        }, 4000);
      };

      // --- HANDLERS ---
      const handleSaveProfile = async () => {
        if (!user) return;
        try {
          const userProfileRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
          await setDoc(userProfileRef, {
            ...profile,
            penName: tempPenName || 'Wandering Quill',
            bio: tempBio || ''
          }, { merge: true });
          showToast("Author profile updated!");
          setShowProfileModal(false);
        } catch (e) {
          showToast("Could not update profile.", "error");
        }
      };

      // AI Cover Generator via Imagen
      const handleGenerateCover = async () => {
        if (!newProjCoverPrompt.trim()) {
          showToast("Please enter an art prompt first!", "error");
          return;
        }
        setGeneratingCover(true);
        try {
          let delay = 1000;
          let success = false;
          let imgData = '';

          for (let attempt = 0; attempt < 5; attempt++) {
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  instances: [
                    { prompt: `Book cover masterwork, artistic illustration style: ${newProjCoverPrompt}, clean composition, epic lighting, vibrant colors, fantasy realism, no text` }
                  ],
                  parameters: { sampleCount: 1 }
                })
              });

              if (!response.ok) throw new Error('Imagen API failure');
              const result = await response.json();
              imgData = `data:image/png;base64,${result.predictions?.[0]?.bytesBase64Encoded}`;
              success = true;
              break;
            } catch (err) {
              if (attempt === 4) throw err;
              await new Promise(r => setTimeout(r, delay));
              delay *= 2;
            }
          }

          if (success && imgData) {
            setNewProjCoverBase64(imgData);
            showToast("Gorgeous cover artwork generated successfully!");
          } else {
            throw new Error("No image data returned.");
          }
        } catch (err) {
          console.error(err);
          showToast("Cover generation failed. Falling back to classic preset.", "error");
          setNewProjCoverType('preset');
        } finally {
          setGeneratingCover(false);
        }
      };

      // Upload/Local Cover Compression using Canvas
      const handleLocalCoverUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            const maxDim = 400; // Keep size lightweight under 1MB for Firestore base64

            if (width > height) {
              if (width > maxDim) {
                height *= maxDim / width;
                width = maxDim;
              }
            } else {
              if (height > maxDim) {
                width *= maxDim / height;
                height = maxDim;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
            setNewProjCoverBase64(compressedBase64);
            showToast("Local cover uploaded and optimized!");
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleCreateProject = async () => {
        if (!newProjTitle.trim()) {
          showToast("Book title is required!", "error");
          return;
        }
        try {
          let finalCover = '';
          if (newProjCoverType === 'preset') {
            finalCover = `preset:${newProjPresetIndex}`;
          } else {
            finalCover = newProjCoverBase64 || `preset:0`;
          }

          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), {
            title: newProjTitle,
            description: newProjDesc,
            genre: newProjGenre || 'Fantasy',
            coverUrl: finalCover,
            authorId: user.uid,
            likes: [],
            createdAt: Date.now()
          });

          showToast(`"${newProjTitle}" added to your Studio!`);
          setShowProjectModal(false);
          setNewProjTitle('');
          setNewProjDesc('');
          setNewProjGenre('');
          setNewProjCoverBase64('');
          setNewProjCoverPrompt('');
        } catch (e) {
          showToast("Could not create book project.", "error");
        }
      };

      const handleDeleteProject = async (projId) => {
        if (!window.confirm("Are you sure you want to delete this story? All drafts & chapters will be lost forever.")) return;
        try {
          // Delete project document
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', projId));
          
          // Delete chapters belonging to this project
          const projectChapters = chapters.filter(c => c.projectId === projId);
          for (let chap of projectChapters) {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chapters', chap.id));
          }
          
          showToast("Story project and its chapters deleted.");
          if (selectedProjectId === projId) {
            setCurrentView('studio');
          }
        } catch (e) {
          showToast("Failed to delete project.", "error");
        }
      };

      // --- NOTEPAD & PUBLISHING CONTROLS ---
      const handleSelectProjectWorkspace = (projId) => {
        setSelectedProjectId(projId);
        const projChapters = chapters.filter(c => c.projectId === projId);
        
        if (projChapters.length > 0) {
          const sorted = [...projChapters].sort((a, b) => a.sequence - b.sequence);
          handleOpenChapter(sorted[0]);
        } else {
          // No chapters exist yet, open a fresh scratchpad state
          setActiveChapter(null);
          setEditorTitle('');
          setEditorContent('');
        }
        setCurrentView('workspace');
      };

      const handleCreateNewChapter = async () => {
        if (!selectedProjectId) return;
        const projChapters = chapters.filter(c => c.projectId === selectedProjectId);
        const nextSeq = projChapters.length + 1;

        try {
          const newChapRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chapters'), {
            projectId: selectedProjectId,
            authorId: user.uid,
            title: `Chapter ${nextSeq}: Untouched Note`,
            content: `*Click edit to begin writing your masterpiece...*`,
            sequence: nextSeq,
            isPublished: false,
            createdAt: Date.now(),
            updatedAt: Date.now()
          });

          showToast("New chapter draft created!");
          // Open immediately
          handleOpenChapter({
            id: newChapRef.id,
            projectId: selectedProjectId,
            authorId: user.uid,
            title: `Chapter ${nextSeq}: Untouched Note`,
            content: `*Click edit to begin writing your masterpiece...*`,
            sequence: nextSeq,
            isPublished: false
          });
        } catch (e) {
          showToast("Could not create chapter.", "error");
        }
      };

      const handleOpenChapter = (chap) => {
        setActiveChapter(chap);
        setEditorTitle(chap.title);
        setEditorContent(chap.content);
      };

      const handleSaveDraft = async () => {
        if (!activeChapter) {
          showToast("Please create or select a chapter first!", "error");
          return;
        }
        try {
          const chapRef = doc(db, 'artifacts', appId, 'public', 'data', 'chapters', activeChapter.id);
          await updateDoc(chapRef, {
            title: editorTitle || 'Untitled Note',
            content: editorContent,
            updatedAt: Date.now()
          });
          showToast("Draft saved.");
        } catch (e) {
          showToast("Error autosaving draft.", "error");
        }
      };

      const handlePublishToggle = async () => {
        if (!activeChapter) return;
        try {
          const nextPublishedState = !activeChapter.isPublished;
          const chapRef = doc(db, 'artifacts', appId, 'public', 'data', 'chapters', activeChapter.id);
          
          // Save content + toggle status
          await updateDoc(chapRef, {
            title: editorTitle || 'Untitled Note',
            content: editorContent,
            isPublished: nextPublishedState,
            publishedAt: nextPublishedState ? Date.now() : null,
            updatedAt: Date.now()
          });

          showToast(nextPublishedState ? "Chapter published to public Library!" : "Chapter pulled to private drafts.");
          setActiveChapter(prev => ({ ...prev, isPublished: nextPublishedState }));
        } catch (e) {
          showToast("Failed to change publishing status.", "error");
        }
      };

      const handleDeleteChapter = async (chapId) => {
        if (!window.confirm("Delete this chapter?")) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chapters', chapId));
          showToast("Chapter deleted.");
          
          // Select another remaining chapter if any
          const remaining = chapters.filter(c => c.projectId === selectedProjectId && c.id !== chapId);
          if (remaining.length > 0) {
            handleOpenChapter(remaining[0]);
          } else {
            setActiveChapter(null);
            setEditorTitle('');
            setEditorContent('');
          }
        } catch (e) {
          showToast("Could not delete chapter.", "error");
        }
      };

      const handleOrderChapter = async (chap, direction) => {
        const projChapters = [...chapters]
          .filter(c => c.projectId === selectedProjectId)
          .sort((a, b) => a.sequence - b.sequence);
        
        const index = projChapters.findIndex(c => c.id === chap.id);
        if (direction === 'up' && index > 0) {
          const target = projChapters[index - 1];
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chapters', chap.id), { sequence: target.sequence });
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chapters', target.id), { sequence: chap.sequence });
        } else if (direction === 'down' && index < projChapters.length - 1) {
          const target = projChapters[index + 1];
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chapters', chap.id), { sequence: target.sequence });
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chapters', target.id), { sequence: chap.sequence });
        }
      };

      const handleToggleLike = async (projId) => {
        if (!user) return;
        const project = projects.find(p => p.id === projId);
        if (!project) return;

        const likedBy = project.likes || [];
        const updatedLikes = likedBy.includes(user.uid)
          ? likedBy.filter(uid => uid !== user.uid)
          : [...likedBy, user.uid];

        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', projId), {
            likes: updatedLikes
          });
        } catch (e) {
          showToast("Could not record appreciate action.", "error");
        }
      };

      // Markdown format helper tool
      const insertMarkdown = (syntax) => {
        const textarea = document.getElementById('notepad-textarea');
        if (!textarea) return;

        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        const selected = text.substring(start, end);

        let replacement = '';
        switch (syntax) {
          case 'bold': replacement = `**${selected || 'bold text'}**`; break;
          case 'italic': replacement = `*${selected || 'italic text'}*`; break;
          case 'h1': replacement = `# ${selected || 'Heading 1'}\n`; break;
          case 'h2': replacement = `## ${selected || 'Heading 2'}\n`; break;
          case 'quote': replacement = `> ${selected || 'Inspirational quote'}\n`; break;
          case 'list': replacement = `- ${selected || 'List item'}\n`; break;
          case 'code': replacement = `\`${selected || 'code inline'}\``; break;
          default: return;
        }

        const nextContent = text.substring(0, start) + replacement + text.substring(end);
        setEditorContent(nextContent);
        
        // Reset focus and selection
        setTimeout(() => {
          textarea.focus();
          textarea.setSelectionRange(start + replacement.length, start + replacement.length);
        }, 0);
      };

      // Helper: render book cover based on DB storage format
      const renderCoverImage = (coverUrl, title, isLarge = false) => {
        if (coverUrl && coverUrl.startsWith('preset:')) {
          const idx = parseInt(coverUrl.split(':')[1], 10) || 0;
          const preset = COVER_PRESETS[idx] || COVER_PRESETS[0];
          return (
            <div className={`w-full h-full flex flex-col justify-between p-4 rounded-lg shadow-md border border-white/10 ${preset.class}`}>
              <div className="flex flex-col gap-1">
                <span className="text-xs uppercase tracking-widest font-semibold opacity-70">Story Novel</span>
                <div className="w-6 h-[2px] bg-current opacity-50"></div>
              </div>
              <h3 className={`${isLarge ? 'text-2xl font-bold' : 'text-base font-semibold'} line-clamp-3 leading-snug font-serif`}>
                {title}
              </h3>
              <div className="flex justify-between items-center text-[10px] opacity-75">
                <span>SAGA PRESS</span>
                <Sparkles className="w-3 h-3" />
              </div>
            </div>
          );
        }

        return (
          <div className="relative w-full h-full rounded-lg shadow-md overflow-hidden bg-zinc-950 border border-neutral-800">
            <img 
              src={coverUrl || "https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=400&q=80"} 
              alt={title} 
              className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
              onError={(e) => {
                e.target.src = "https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=400&q=80";
              }}
            />
            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/30 p-4 flex flex-col justify-between">
              <span className="text-[9px] uppercase font-bold tracking-widest text-amber-400 bg-black/40 px-1.5 py-0.5 rounded self-start">
                Original Art
              </span>
              <h3 className={`text-white leading-tight font-serif ${isLarge ? 'text-2xl font-bold' : 'text-sm font-bold line-clamp-2'}`}>
                {title}
              </h3>
            </div>
          </div>
        );
      };

      // Parse Markdown to HTML cleanly
      const renderMarkdownHTML = (mdText) => {
        if (!mdText) return '<p class="text-neutral-500 italic">No writing inside this chapter yet.</p>';
        if (window.marked) {
          return window.marked.parse(mdText);
        }
        // Simplistic fallback if marked failed to load
        return mdText

                  <button
                    onClick={handleCreateProject}
                    className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-bold shadow-md shadow-indigo-600/20"
                  >
                    Assemble Story Spine
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Elegant Footer */}
          <footer className="bg-slate-900/40 border-t border-slate-800/50 py-4 px-4 text-center text-xs text-slate-500">
            <p>© 2026 Saga Studio. Real-time markdown storyboards integrated with Firestore & Gemini Imagen.</p>
          </footer>
        </div>
      );
    }

    // React 18 Mounting Protocol
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
